apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-butterfly-web-vue
  namespace: blog-butterfly-go
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blog-butterfly-web-vue
  template:
    metadata:
      labels:
        app: blog-butterfly-web-vue
    spec:
      containers:
        - name: web-vue
          image: blog-butterfly-web-vue:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: blog-butterfly-web-vue
  namespace: blog-butterfly-go
spec:
  type: NodePort
  selector:
    app: blog-butterfly-web-vue
  ports:
    - port: 80
      targetPort: 80
      nodePort: 31086
