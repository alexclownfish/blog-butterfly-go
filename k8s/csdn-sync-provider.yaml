apiVersion: apps/v1
kind: Deployment
metadata:
  name: csdn-sync-provider
  namespace: blog-butterfly-go
spec:
  replicas: 1
  selector:
    matchLabels:
      app: csdn-sync-provider
  template:
    metadata:
      labels:
        app: csdn-sync-provider
    spec:
      containers:
      - name: csdn-sync-provider
        image: csdn-sync-provider:latest
        imagePullPolicy: Never
        env:
        - name: CSDN_PROVIDER_MODE
          value: "real"
        - name: CSDN_PROVIDER_NAME
          value: "csdn"
        - name: CSDN_PROVIDER_LOGIN_MESSAGE
          value: "real provider bridge ready: 当前已切到独立 provider 服务"
        - name: CSDN_PROVIDER_STATUS_MESSAGE
          value: "waiting for real provider authorization"
        ports:
        - containerPort: 8091
---
apiVersion: v1
kind: Service
metadata:
  name: csdn-sync-provider
  namespace: blog-butterfly-go
spec:
  type: ClusterIP
  selector:
    app: csdn-sync-provider
  ports:
  - port: 8091
    targetPort: 8091
