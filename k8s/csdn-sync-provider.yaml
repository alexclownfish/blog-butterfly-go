apiVersion: apps/v1
kind: Deployment
metadata:
  name: csdn-sync-provider
  namespace: blog-butterfly-go
spec:
  replicas: 1
  selector:
    matchLabels:
      app: csdn-sync-provider
  template:
    metadata:
      labels:
        app: csdn-sync-provider
    spec:
      containers:
      - name: csdn-sync-provider
        image: csdn-sync-provider:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8091
---
apiVersion: v1
kind: Service
metadata:
  name: csdn-sync-provider
  namespace: blog-butterfly-go
spec:
  type: ClusterIP
  selector:
    app: csdn-sync-provider
  ports:
  - port: 8091
    targetPort: 8091
