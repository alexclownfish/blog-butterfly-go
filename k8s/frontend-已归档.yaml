# 归档说明：该清单对应旧 `frontend/` 静态站点部署，现仅保留历史参考，不作为现役部署入口。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-butterfly-frontend
  namespace: blog-butterfly-go
spec:
  replicas: 2
  selector:
    matchLabels:
      app: blog-butterfly-frontend
  template:
    metadata:
      labels:
        app: blog-butterfly-frontend
    spec:
      containers:
      - name: frontend
        image: blog-butterfly-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: blog-butterfly-frontend
  namespace: blog-butterfly-go
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
    nodePort: 31084
  selector:
    app: blog-butterfly-frontend
