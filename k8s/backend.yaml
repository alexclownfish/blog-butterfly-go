apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-butterfly-backend
  namespace: blog-butterfly-go
spec:
  replicas: 2
  selector:
    matchLabels:
      app: blog-butterfly-backend
  template:
    metadata:
      labels:
        app: blog-butterfly-backend
    spec:
      containers:
      - name: backend
        image: blog-butterfly-backend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: blog-butterfly-backend
  namespace: blog-butterfly-go
spec:
  type: NodePort
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 31083
  selector:
    app: blog-butterfly-backend
