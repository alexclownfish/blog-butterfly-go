apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-butterfly-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: blog-butterfly-frontend
  template:
    metadata:
      labels:
        app: blog-butterfly-frontend
    spec:
      containers:
      - name: frontend
        image: blog-butterfly-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: blog-butterfly-frontend
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30084
  selector:
    app: blog-butterfly-frontend
