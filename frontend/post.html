<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章详情 - Alexcld</title>
  <meta name="description" content="Alexcld 技术博客文章详情页。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #050816;
      --bg-soft: rgba(255,255,255,0.04);
      --panel: rgba(10, 14, 31, 0.78);
      --panel-strong: rgba(10, 14, 31, 0.92);
      --border: rgba(255,255,255,0.1);
      --text: #f5f7ff;
      --muted: #97a0c3;
      --muted-strong: #c6ccef;
      --brand: #7c8cff;
      --brand-2: #4de2c5;
      --accent: #8f5cff;
      --shadow: 0 24px 80px rgba(0,0,0,0.35);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --container: 1240px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Geist', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      line-height: 1.6;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(124,140,255,0.22), transparent 35%),
        radial-gradient(circle at 85% 15%, rgba(77,226,197,0.16), transparent 25%),
        linear-gradient(180deg, #070b1b 0%, #050816 45%, #040611 100%);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: radial-gradient(circle at center, black 35%, transparent 85%);
      opacity: 0.45;
    }

    a { color: inherit; text-decoration: none; }
    button { font: inherit; }

    .site-shell {
      position: relative;
      z-index: 1;
      padding: 28px 0 72px;
    }

    .container {
      width: min(var(--container), calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      padding: 14px 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 999px;
      backdrop-filter: blur(18px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.16);
      position: sticky;
      top: 18px;
      z-index: 30;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      color: white;
      font-weight: 700;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.35), 0 12px 30px rgba(124,140,255,0.28);
      flex-shrink: 0;
    }

    .brand-copy strong {
      display: block;
      font-size: 1rem;
      letter-spacing: -0.03em;
    }

    .brand-copy span {
      display: block;
      color: var(--muted);
      font-size: 0.84rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .topbar-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: var(--muted-strong);
      font-size: 0.88rem;
      white-space: nowrap;
    }

    .hero {
      margin-top: 26px;
      padding: 38px;
      border-radius: calc(var(--radius-xl) + 8px);
      background:
        linear-gradient(135deg, rgba(124,140,255,0.18), rgba(255,255,255,0.04) 42%, rgba(77,226,197,0.12)),
        rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: '';
      position: absolute;
      width: 380px;
      height: 380px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,140,255,0.35), transparent 65%);
      right: -140px;
      top: -140px;
      pointer-events: none;
    }

    .hero-content { position: relative; z-index: 1; }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: #dbe1ff;
      font-size: 0.9rem;
      margin-bottom: 18px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 11px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #eff2ff;
      transition: transform .2s ease, background .2s ease, border-color .2s ease;
      margin-bottom: 18px;
    }

    .back-link:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.09);
      border-color: rgba(124,140,255,0.35);
    }

    .hero-title {
      font-size: clamp(2rem, 4.2vw, 3.9rem);
      line-height: 1.04;
      letter-spacing: -0.045em;
      max-width: 14ch;
      margin-bottom: 16px;
    }

    .hero-summary {
      max-width: 70ch;
      color: var(--muted-strong);
      font-size: 1.05rem;
    }

    .meta-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    .meta-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--muted-strong);
      font-size: 0.92rem;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 22px;
      align-items: start;
      margin-top: 24px;
    }

    .card {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-lg);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .article-shell {
      padding: 28px;
    }

    .content-prose {
      color: #eef2ff;
      font-size: 1.04rem;
      line-height: 1.9;
      word-break: break-word;
    }

    .content-prose > *:first-child { margin-top: 0; }
    .content-prose > *:last-child { margin-bottom: 0; }

    .content-prose h1,
    .content-prose h2,
    .content-prose h3,
    .content-prose h4 {
      margin: 2.2rem 0 1rem;
      line-height: 1.2;
      letter-spacing: -0.04em;
      color: #ffffff;
      scroll-margin-top: 110px;
    }

    .content-prose h1 { font-size: 2rem; }
    .content-prose h2 { font-size: 1.62rem; }
    .content-prose h3 { font-size: 1.28rem; }
    .content-prose h4 { font-size: 1.06rem; }

    .content-prose p,
    .content-prose ul,
    .content-prose ol,
    .content-prose blockquote,
    .content-prose table,
    .content-prose pre,
    .content-prose img {
      margin: 1.1rem 0;
    }

    .content-prose ul,
    .content-prose ol {
      padding-left: 1.5rem;
    }

    .content-prose li + li { margin-top: 0.45rem; }

    .content-prose a {
      color: #99e8da;
      text-decoration: none;
      border-bottom: 1px solid rgba(153,232,218,0.3);
    }

    .content-prose a:hover {
      color: white;
      border-bottom-color: rgba(255,255,255,0.55);
    }

    .content-prose strong { color: #fff; }

    .content-prose code {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 0.2rem 0.45rem;
      border-radius: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.9em;
      color: #c6fdf4;
    }

    .content-prose pre {
      position: relative;
      background: linear-gradient(180deg, rgba(13,19,41,0.98), rgba(8,13,28,0.98));
      color: #f3f6ff;
      padding: 1rem;
      border-radius: 18px;
      overflow-x: auto;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .content-prose pre code {
      background: none;
      border: none;
      padding: 0;
      color: inherit;
    }

    .copy-btn {
      position: absolute;
      right: 12px;
      top: 12px;
      padding: 7px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.08);
      color: white;
      cursor: pointer;
      font-size: 0.86rem;
      transition: all .2s ease;
    }

    .copy-btn:hover { background: rgba(255,255,255,0.14); }
    .copy-btn.copied { background: rgba(77,226,197,0.18); border-color: rgba(77,226,197,0.35); color: #9df7e7; }

    .content-prose img {
      max-width: 100%;
      height: auto;
      border-radius: 16px;
      display: block;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 20px 40px rgba(0,0,0,0.28);
    }

    .content-prose blockquote {
      padding: 1rem 1.15rem;
      border-left: 4px solid var(--brand);
      background: rgba(124,140,255,0.1);
      border-radius: 0 16px 16px 0;
      color: #d9e0ff;
    }

    .content-prose hr {
      border: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.16), transparent);
      margin: 2rem 0;
    }

    .content-prose table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 16px;
      border-style: hidden;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08);
      display: block;
      overflow-x: auto;
    }

    .content-prose th,
    .content-prose td {
      padding: 0.85rem 1rem;
      border: 1px solid rgba(255,255,255,0.08);
      text-align: left;
      white-space: nowrap;
    }

    .content-prose th {
      background: rgba(255,255,255,0.06);
      color: #fff;
    }

    .side-stack {
      display: grid;
      gap: 18px;
      position: sticky;
      top: 92px;
    }

    .side-card {
      padding: 20px;
    }

    .side-card h3 {
      font-size: 1.02rem;
      margin-bottom: 6px;
      letter-spacing: -0.03em;
    }

    .side-card p,
    .side-card li,
    .state-text,
    .loading,
    .error-state p {
      color: var(--muted);
    }

    .toc-list {
      list-style: none;
      margin-top: 14px;
      display: grid;
      gap: 8px;
      max-height: 52vh;
      overflow-y: auto;
      padding-right: 4px;
    }

    .toc-list li {
      position: relative;
    }

    .toc-list a {
      display: block;
      position: relative;
      padding: 8px 10px;
      border-radius: 12px;
      color: var(--muted-strong);
      background: rgba(255,255,255,0.03);
      border: 1px solid transparent;
      transition: all .2s ease;
      font-size: 0.92rem;
      line-height: 1.45;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .toc-list a::before {
      content: '';
      position: absolute;
      left: 12px;
      top: 50%;
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: rgba(124,140,255,0.45);
      transform: translateY(-50%);
      box-shadow: 0 0 0 4px rgba(124,140,255,0.08);
      transition: all .2s ease;
    }

    .toc-list a:hover,
    .toc-list a.active {
      color: white;
      background: rgba(124,140,255,0.14);
      border-color: rgba(124,140,255,0.2);
      transform: translateX(2px);
    }

    .toc-list a:hover::before,
    .toc-list a.active::before {
      background: rgba(255,255,255,0.95);
      box-shadow: 0 0 0 4px rgba(124,140,255,0.16);
    }

    .toc-h1 a {
      padding-left: 28px;
      font-weight: 700;
      color: white;
      background: rgba(124,140,255,0.12);
      border-color: rgba(124,140,255,0.16);
    }

    .toc-h1 a::before {
      left: 12px;
      width: 8px;
      height: 8px;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 0 0 5px rgba(124,140,255,0.16);
    }

    .toc-h2 a {
      padding-left: 40px;
      font-weight: 600;
    }

    .toc-h2 a::before {
      left: 22px;
    }

    .toc-h3 a {
      padding-left: 54px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .toc-h3 a::before {
      left: 36px;
      width: 5px;
      height: 5px;
      background: rgba(124,140,255,0.36);
      box-shadow: 0 0 0 3px rgba(124,140,255,0.08);
    }

    .toc-h4 a {
      padding-left: 68px;
      font-size: 0.88rem;
      color: rgba(230,235,255,0.72);
    }

    .toc-h4 a::before {
      left: 50px;
      width: 4px;
      height: 4px;
      background: rgba(124,140,255,0.3);
      box-shadow: 0 0 0 3px rgba(124,140,255,0.06);
    }

    .loading,
    .error-state {
      padding: 48px 24px;
      text-align: center;
    }

    .error-state strong {
      display: block;
      font-size: 1.1rem;
      margin-bottom: 8px;
    }

    .footer-note {
      margin-top: 26px;
      text-align: center;
      color: var(--muted);
      font-size: 0.92rem;
    }

    @media (max-width: 1024px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .side-stack {
        position: static;
      }
    }

    @media (max-width: 720px) {
      .site-shell { padding-top: 18px; }

      .topbar {
        border-radius: 24px;
        align-items: flex-start;
      }

      .topbar,
      .topbar-meta {
        flex-direction: column;
        align-items: stretch;
      }

      .hero,
      .article-shell,
      .side-card {
        border-radius: 20px;
      }

      .hero {
        padding: 24px;
      }

      .article-shell {
        padding: 20px;
      }

      .hero-title {
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <div class="site-shell">
    <div class="container">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">A</div>
          <div class="brand-copy">
            <strong>Alexcld</strong>
            <span>children don't lie · 技术博客母舰已升空</span>
          </div>
        </div>
        <div class="topbar-meta">
          <span class="pill">文章详情页</span>
          <span class="pill" id="topbar-status">内容准备中…</span>
        </div>
      </header>

      <section class="hero">
        <div class="hero-content">
          <a href="/" class="back-link" id="back-link">← 返回列表</a>
          <div class="eyebrow">✦ 深读模式已开启</div>
          <h1 class="hero-title" id="article-title">加载中...</h1>
          <p class="hero-summary" id="article-summary">正在为你装载正文内容，请稍等片刻。</p>
          <div class="meta-row">
            <span class="meta-pill" id="article-category">📁 未分类</span>
            <span class="meta-pill" id="article-views">👁️ 0 次阅读</span>
            <span class="meta-pill" id="article-date">🗓️ 暂无日期</span>
          </div>
        </div>
      </section>

      <main class="layout">
        <section class="card article-shell">
          <div id="loading" class="loading">文章内容装载中，请稍候…</div>
          <div id="error-state" class="error-state" hidden>
            <strong id="error-title">文章不存在</strong>
            <p id="error-message">请检查链接是否正确，或者回到列表继续逛逛。</p>
          </div>
          <article id="article" class="content-prose" hidden></article>
        </section>

        <aside class="side-stack">
          <section class="card side-card">
            <h3>阅读状态</h3>
            <p class="state-text" id="reading-state">文章加载完成后，这里会显示当前阅读信息。</p>
          </section>
          <section class="card side-card" id="toc-card" hidden>
            <h3>目录导航</h3>
            <p>点击标题可快速跳转，不用疯狂滚轮搓火星子。</p>
            <ul class="toc-list" id="toc-list"></ul>
          </section>
        </aside>
      </main>

      <div class="footer-note">Unified with the new homepage · Readable, modern, still API-driven ✨</div>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script>
    const API = window.getApiBase();
    const pageParams = new URLSearchParams(window.location.search);
    const id = pageParams.get('id');
    const from = pageParams.get('from');
    const backLink = document.getElementById('back-link');
    const loadingEl = document.getElementById('loading');
    const articleEl = document.getElementById('article');
    const errorStateEl = document.getElementById('error-state');
    const topbarStatusEl = document.getElementById('topbar-status');
    const readingStateEl = document.getElementById('reading-state');
    const tocCardEl = document.getElementById('toc-card');
    const tocListEl = document.getElementById('toc-list');

    if (from && from.startsWith('/')) {
      backLink.href = from;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatDate(value) {
      if (!value) return '🗓️ 暂无日期';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '🗓️ 暂无日期';
      return `🗓️ ${date.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' })}`;
    }

    function plainTextFromMarkdown(markdown) {
      return String(markdown || '')
        .replace(/```[\s\S]*?```/g, ' ')
        .replace(/`([^`]+)`/g, '$1')
        .replace(/!\[[^\]]*\]\([^)]*\)/g, ' ')
        .replace(/\[[^\]]+\]\([^)]*\)/g, '$1')
        .replace(/[#>*_~\-]+/g, ' ')
        .replace(/\n+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function showError(title, message) {
      loadingEl.hidden = true;
      articleEl.hidden = true;
      errorStateEl.hidden = false;
      document.getElementById('error-title').textContent = title;
      document.getElementById('error-message').textContent = message;
      topbarStatusEl.textContent = '内容加载失败';
      readingStateEl.textContent = '当前没有可阅读内容。';
    }

    function addCopyButtons() {
      articleEl.querySelectorAll('pre').forEach(pre => {
        if (pre.querySelector('.copy-btn')) return;
        const btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.type = 'button';
        btn.textContent = '复制';
        btn.onclick = async () => {
          const code = pre.querySelector('code') ? pre.querySelector('code').textContent : pre.textContent;
          try {
            await navigator.clipboard.writeText(code);
            btn.textContent = '已复制';
            btn.classList.add('copied');
            setTimeout(() => {
              btn.textContent = '复制';
              btn.classList.remove('copied');
            }, 1800);
          } catch (error) {
            btn.textContent = '复制失败';
            setTimeout(() => { btn.textContent = '复制'; }, 1800);
          }
        };
        pre.appendChild(btn);
      });
    }

    function buildTOC() {
      const headings = articleEl.querySelectorAll('h1, h2, h3, h4');
      tocListEl.innerHTML = '';
      if (!headings.length) {
        tocCardEl.hidden = true;
        return;
      }

      headings.forEach((heading, index) => {
        const headingId = heading.id || `heading-${index}`;
        heading.id = headingId;
        const item = document.createElement('li');
        item.className = `toc-${heading.tagName.toLowerCase()}`;
        const link = document.createElement('a');
        link.href = `#${headingId}`;
        link.textContent = heading.textContent.trim() || `小节 ${index + 1}`;
        link.onclick = (event) => {
          event.preventDefault();
          heading.scrollIntoView({ behavior: 'smooth', block: 'start' });
          document.querySelectorAll('.toc-list a').forEach(a => a.classList.remove('active'));
          link.classList.add('active');
        };
        item.appendChild(link);
        tocListEl.appendChild(item);
      });

      tocCardEl.hidden = false;
    }

    async function loadArticle() {
      if (!id) {
        showError('文章不存在', '没有检测到文章 ID，请从列表页重新进入。');
        return;
      }

      try {
        const res = await fetch(`${API}/articles/${id}`);
        const json = await res.json();

        if (!json.data) {
          showError('文章不存在', '接口没有返回对应文章，可能已被删除或链接失效。');
          return;
        }

        const article = json.data;
        const title = article.title || '未命名文章';
        const summary = plainTextFromMarkdown(article.summary || article.content || '').slice(0, 140) || '这篇文章没有单独摘要，但正文已经准备好了。';
        const categoryName = article.category?.name || '未分类';
        const views = article.views || 0;

        document.title = `${title} | Alexcld`;
        document.getElementById('article-title').textContent = title;
        document.getElementById('article-summary').textContent = summary;
        document.getElementById('article-category').textContent = `📁 ${categoryName}`;
        document.getElementById('article-views').textContent = `👁️ ${views} 次阅读`;
        document.getElementById('article-date').textContent = formatDate(article.created_at);
        topbarStatusEl.textContent = '文章已就绪';
        readingStateEl.textContent = `当前正在阅读《${title}》，分类：${categoryName}，阅读量：${views}。`;

        articleEl.innerHTML = marked.parse(article.content || '');
        addCopyButtons();
        buildTOC();

        loadingEl.hidden = true;
        errorStateEl.hidden = true;
        articleEl.hidden = false;
      } catch (error) {
        console.error('加载失败:', error);
        showError('加载失败', '请求文章内容时出了点小状况，请稍后重试。');
      }
    }

    loadArticle();
  </script>
</body>
</html>
