<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>素材管理 | Alexcld CMS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .header { background: #49b1f5; color: white; padding: 15px 20px; }
    .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
    .upload-area { border: 2px dashed #ddd; padding: 40px; text-align: center; margin-bottom: 20px; border-radius: 10px; }
    .upload-area:hover { border-color: #49b1f5; }
    input[type="file"] { display: none; }
    button { padding: 12px 30px; background: #49b1f5; color: white; border: none; border-radius: 5px; cursor: pointer; }
    .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
    .image-item { position: relative; border: 1px solid #ddd; border-radius: 5px; overflow: hidden; }
    .image-item img { width: 100%; height: 150px; object-fit: cover; }
    .image-url { padding: 10px; font-size: 12px; background: #f5f5f5; word-break: break-all; }
  </style>
</head>
<body>
  <div class="header"><h2>素材管理</h2></div>
  <div class="container">
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      <p>点击或拖拽上传素材图片</p>
      <input type="file" id="fileInput" accept="image/*" onchange="uploadImage(this)">
    </div>
    <div class="image-grid" id="imageList"></div>
  </div>
  
  <script>
    const API = 'http://172.28.74.191:30083/api';
    const token = localStorage.getItem('token');
    
    function uploadImage(input) {
      const file = input.files[0];
      if (!file) return;
      
      const formData = new FormData();
      formData.append('image', file);
      
      fetch(`${API}/upload`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
        body: formData
      })
      .then(res => res.json())
      .then(data => {
        alert('上传成功，素材地址：' + data.url);
        loadImages();
      });
    }
    
    function loadImages() {
      // 这里可以加载已上传的图片列表
      // 暂时留空，后续实现
    }
  </script>
</body>
</html>
