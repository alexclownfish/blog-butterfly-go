<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>分类管理 | Alexcld CMS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .header { background: #49b1f5; color: white; padding: 15px 20px; }
    .container { max-width: 800px; margin: 20px auto; padding: 0 20px; }
    input { padding: 10px; margin-right: 10px; border: 1px solid #ddd; border-radius: 5px; }
    button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
    .btn-add { background: #49b1f5; color: white; }
    .btn-delete { background: #ff4757; color: white; margin-left: 10px; }
    .category-item { padding: 15px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>
  <div class="header"><h2>分类管理</h2></div>
  <div class="container">
    <div style="margin-bottom: 20px;">
      <input type="text" id="newCategory" placeholder="请输入分类名称">
      <button class="btn-add" onclick="addCategory()">新增分类</button>
    </div>
    <div id="categoryList"></div>
  </div>
  
  <script>
    const API = 'http://172.28.74.191:30083/api';
    const token = localStorage.getItem('token');
    
    function loadCategories() {
      fetch(`${API}/categories`).then(res => res.json()).then(json => {
        const list = document.getElementById('categoryList');
        list.innerHTML = '';
        json.data.forEach(cat => {
          list.innerHTML += `
            <div class="category-item">
              <span>${cat.name}</span>
              <button class="btn-delete" onclick="deleteCategory(${cat.id})">删除</button>
            </div>
          `;
        });
      });
    }
    
    function addCategory() {
      const name = document.getElementById('newCategory').value;
      if (!name) return alert('请输入分类名称后再提交');
      
      fetch(`${API}/categories`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ name })
      }).then(() => { document.getElementById('newCategory').value = ''; loadCategories(); });
    }
    
    function deleteCategory(id) {
      if (!confirm('确认删除该分类？')) return;
      fetch(`${API}/categories/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      }).then(() => loadCategories());
    }
    
    loadCategories();
  </script>
</body>
</html>
