<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 | Alexcld Admin</title>
  <meta name="description" content="Alexcld 博客后台登录">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050816;
      --panel: rgba(10, 14, 31, 0.82);
      --panel-strong: rgba(10, 14, 31, 0.92);
      --border: rgba(255,255,255,0.1);
      --text: #f5f7ff;
      --muted: #97a0c3;
      --muted-strong: #c6ccef;
      --brand: #7c8cff;
      --brand-2: #4de2c5;
      --danger: #ff7a90;
      --shadow: 0 24px 80px rgba(0,0,0,0.36);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: 'Geist', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(124,140,255,0.22), transparent 35%),
        radial-gradient(circle at 85% 15%, rgba(77,226,197,0.16), transparent 25%),
        linear-gradient(180deg, #070b1b 0%, #050816 45%, #040611 100%);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: radial-gradient(circle at center, black 35%, transparent 85%);
      opacity: 0.45;
    }

    .shell {
      width: min(1120px, 100%);
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(340px, 420px);
      gap: 24px;
      position: relative;
      z-index: 1;
    }

    .hero,
    .login-card {
      border-radius: var(--radius-xl);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 40px;
      min-height: 620px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background:
        linear-gradient(135deg, rgba(124,140,255,0.18), rgba(255,255,255,0.04) 42%, rgba(77,226,197,0.12)),
        rgba(255,255,255,0.03);
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: '';
      position: absolute;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,140,255,0.34), transparent 65%);
      right: -170px;
      top: -140px;
      pointer-events: none;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 10px 14px;
      border-radius: 999px;
      width: fit-content;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .brand-mark {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      color: white;
      font-weight: 700;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.35), 0 12px 30px rgba(124,140,255,0.28);
    }

    .brand-copy strong {
      display: block;
      letter-spacing: -0.03em;
    }

    .brand-copy span {
      display: block;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: #dbe1ff;
      font-size: 0.9rem;
      margin-bottom: 20px;
      width: fit-content;
    }

    .hero h1 {
      font-size: clamp(2.8rem, 5vw, 5.4rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
      max-width: 8ch;
      margin: 18px 0;
    }

    .hero p {
      max-width: 54ch;
      color: var(--muted-strong);
      font-size: 1.02rem;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 26px;
    }

    .hero-stat {
      padding: 18px;
      border-radius: var(--radius-md);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .hero-stat small {
      display: block;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .hero-stat strong {
      font-size: 1.22rem;
      letter-spacing: -0.04em;
    }

    .hero-footer {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted-strong);
      font-size: 0.92rem;
    }

    .hero-chip {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .login-card {
      padding: 34px;
      background: var(--panel-strong);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .login-head h2 {
      font-size: 2rem;
      letter-spacing: -0.05em;
      margin-bottom: 10px;
    }

    .login-head p {
      color: var(--muted);
      margin-bottom: 24px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted-strong);
      font-size: 0.92rem;
    }

    .field input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font: inherit;
      transition: border-color .2s ease, box-shadow .2s ease, background .2s ease;
    }

    .field input::placeholder { color: rgba(198,204,239,0.55); }

    .field input:focus {
      outline: none;
      border-color: rgba(124,140,255,0.56);
      box-shadow: 0 0 0 4px rgba(124,140,255,0.14);
      background: rgba(255,255,255,0.06);
    }

    .submit {
      width: 100%;
      margin-top: 10px;
      padding: 14px 18px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--brand), #93a0ff);
      color: white;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform .2s ease, box-shadow .2s ease, opacity .2s ease;
      box-shadow: 0 14px 34px rgba(124,140,255,0.32);
    }

    .submit:hover { transform: translateY(-1px); }
    .submit:disabled { opacity: .72; cursor: wait; }

    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.9rem;
      flex-wrap: wrap;
    }

    .error {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,122,144,0.28);
      background: rgba(255,122,144,0.12);
      color: #ffd8df;
      min-height: 48px;
      display: none;
      align-items: center;
    }

    .error.show { display: flex; }

    @media (max-width: 960px) {
      .shell { grid-template-columns: 1fr; }
      .hero { min-height: unset; }
      .hero-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .hero, .login-card { padding: 24px; }
      .hero h1 { max-width: 10ch; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div>
        <div class="brand">
          <div class="brand-mark">A</div>
          <div class="brand-copy">
            <strong>Alexcld Admin</strong>
            <span>children don't lie · control center</span>
          </div>
        </div>

        <div style="margin-top: 54px;">
          <div class="eyebrow">🛸 后台管理指挥舱</div>
          <h1>登录后，把博客宇宙重新排队。</h1>
          <p>文章、分类、图床都在这里统一调度。界面换了新皮肤，但登录接口、token 逻辑和后台功能还是原班人马，没有偷偷把发动机换成拖拉机。</p>
          <div class="hero-grid">
            <div class="hero-stat">
              <small>模块</small>
              <strong>文章 / 分类 / 图床</strong>
            </div>
            <div class="hero-stat">
              <small>登录方式</small>
              <strong>JWT Token</strong>
            </div>
            <div class="hero-stat">
              <small>风格</small>
              <strong>现代深色玻璃风</strong>
            </div>
          </div>
        </div>
      </div>

      <div class="hero-footer">
        <span class="hero-chip">✦ 统一前后台视觉</span>
        <span class="hero-chip">✦ 保留原有 API</span>
        <span class="hero-chip">✦ 少改逻辑，多改气质</span>
      </div>
    </section>

    <section class="login-card">
      <div class="login-head">
        <h2>后台登录</h2>
        <p>欢迎回来，输入账号密码，进入管理台继续折腾内容宇宙。</p>
      </div>

      <div class="field">
        <label for="username">用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" autocomplete="username">
      </div>

      <div class="field">
        <label for="password">密码</label>
        <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
      </div>

      <button class="submit" id="loginBtn" onclick="login()">进入指挥舱</button>

      <div class="meta">
        <span>children don't lie</span>
        <span>Alexcld Admin</span>
      </div>

      <div class="error" id="error"></div>
    </section>
  </div>

  <script src="/js/config.js"></script>
  <script>
    const API = window.getApiBase();

    function setError(message = '') {
      const error = document.getElementById('error');
      error.textContent = message;
      error.classList.toggle('show', !!message);
    }

    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('loginBtn');

      if (!username || !password) {
        setError('用户名和密码都要填，不然后台认不出自己人。');
        return;
      }

      try {
        setError('');
        loginBtn.disabled = true;
        loginBtn.textContent = '登录中...';

        const res = await fetch(`${API}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (data.token) {
          localStorage.setItem('token', data.token);
          location.href = '/admin/';
        } else {
          setError(data.error || '登录失败，请检查账号密码。');
        }
      } catch (error) {
        setError('网络错误，后台大门暂时卡了一下。');
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = '进入指挥舱';
      }
    }

    document.getElementById('password').addEventListener('keydown', (event) => {
      if (event.key === 'Enter') login();
    });
    document.getElementById('username').addEventListener('keydown', (event) => {
      if (event.key === 'Enter') login();
    });
  </script>
</body>
</html>
