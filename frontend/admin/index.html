<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台管理 | Alexcld Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/style.css">
</head>
<body>
  <div class="admin-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark">A</div>
        <div>
          <strong>Alexcld Admin</strong>
          <span>children don't lie</span>
        </div>
      </div>

      <div class="sidebar-group">
        <div class="sidebar-label">导航</div>
        <a href="#" onclick="showPage('articles', this); return false;" class="active">📄 文章管理</a>
        <a href="#" onclick="showPage('categories', this); return false;">📁 分类管理</a>
        <a href="#" onclick="showPage('images', this); return false;">🖼️ 图床管理</a>
      </div>

      <div class="sidebar-footnote">
        <div class="foot-card">
          <small>后台风格</small>
          <strong>Modern Glass Control</strong>
        </div>
        <div class="foot-card">
          <small>数据驱动</small>
          <strong>API / Token / CRUD</strong>
        </div>
      </div>
    </aside>

    <div class="main-area">
      <header class="header">
        <div>
          <div class="header-eyebrow">🛸 Blog control center</div>
          <h1>博客管理系统</h1>
          <p>文章、分类、图床在这里统一调度。UI 升级了，但业务逻辑还是那个靠谱老搭档。</p>
        </div>

        <div class="header-actions">
          <div class="status-pill">在线控制台</div>
          <button class="ghost-btn" onclick="logout()">退出登录</button>
        </div>
      </header>

      <section class="dashboard-strip">
        <div class="dashboard-card">
          <small>文章总数</small>
          <strong id="dashboard-article-total">--</strong>
        </div>
        <div class="dashboard-card">
          <small>已发布 / 草稿</small>
          <strong id="dashboard-published-total">-- / --</strong>
        </div>
        <div class="dashboard-card">
          <small>分类 / 图片</small>
          <strong id="dashboard-category-image-total">-- / --</strong>
        </div>
      </section>

      <main class="content" id="content"></main>
    </div>
  </div>

  <div id="editorModal" class="modal-shell" style="display:none;">
    <div class="modal-backdrop" onclick="closeEditor()"></div>
    <div class="modal-card">
      <div class="modal-header">
        <div>
          <div class="modal-eyebrow">✦ Article workspace</div>
          <h3 id="editorTitle">新建文章</h3>
        </div>
        <button class="icon-btn" onclick="closeEditor()" aria-label="关闭">✕</button>
      </div>

      <div class="modal-form-grid">
        <div class="field span-2">
          <label for="editTitle">标题</label>
          <input type="text" id="editTitle" placeholder="给文章取个一眼能记住的标题">
        </div>

        <div class="field span-2">
          <label for="editSummary">摘要</label>
          <input type="text" id="editSummary" placeholder="一句话概括这篇文章的重点">
        </div>

        <div class="field">
          <label for="editCategory">分类</label>
          <select id="editCategory">
            <option value="">选择分类</option>
          </select>
        </div>

        <div class="field span-2">
          <label for="editTags">标签</label>
          <input type="text" id="editTags" placeholder="多个标签用逗号分隔，如 Docker,K8s,监控">
        </div>

        <div class="field span-2 cover-field">
          <label for="editCover">封面图片 URL</label>
          <input type="text" id="editCover" placeholder="未填写时将自动随机选择一张图床图片" oninput="handleCoverInputChange()">
          <div id="coverPreview" class="cover-preview empty">
            <div class="cover-preview-row">
              <div class="cover-preview-thumb cover-preview-thumb-empty">🖼️</div>
              <div class="cover-preview-side">
                <div class="cover-preview-actions">
                  <strong>未选择封面</strong>
                  <button type="button" class="btn btn-ghost btn-cover-refresh" onclick="refreshRandomCover()">换一张</button>
                </div>
                <p>默认会随机挑一张图，你要是不喜欢，直接改 URL 就行。</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="meta-row">
        <label class="toggle-item"><input type="checkbox" id="editIsTop"> <span>置顶文章</span></label>
        <label class="status-select">状态
          <select id="editStatus">
            <option value="published">已发布</option>
            <option value="draft">草稿</option>
          </select>
        </label>
      </div>

      <div class="field">
        <label for="editContent">正文内容</label>
        <textarea id="editContent" class="editor-textarea" placeholder="在这里写下正文内容..."></textarea>
      </div>

      <div class="modal-actions">
        <button class="btn btn-primary" onclick="saveArticle()">保存</button>
        <button class="btn" onclick="closeEditor()">取消</button>
      </div>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/admin/app.js"></script>
</body>
</html>
